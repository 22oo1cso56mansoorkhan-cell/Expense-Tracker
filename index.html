<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker · SpendWise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Outfit:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar glass">
            <div class="brand">
                <div class="logo-icon">💰</div>
                <h2>SpendWise</h2>
            </div>

            <!-- income -->
            <div>
                <h3>📊 Monthly Income</h3>
                <form id="income-form">
                    <div class="input-group">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="income-input" placeholder="e.g. 4200" min="0" step="any">
                    </div>
                    <button type="submit" class="btn btn-secondary">Update Income</button>
                </form>
            </div>

            <!-- add expense -->
            <div>
                <h3>➕ Add Expense</h3>
                <form id="expense-form">
                    <div class="input-group" style="margin-bottom:8px;">
                        <input type="text" id="expense-name" placeholder="What did you buy?" required>
                    </div>
                    <div class="input-group" style="margin-bottom:8px;">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="expense-amount" placeholder="0.00" min="0.01" step="any" required>
                    </div>
                    <select id="expense-category" required style="margin-bottom:12px;">
                        <option value="" disabled selected>Category</option>
                        <option value="Food">🍕 Food</option>
                        <option value="Travel">✈️ Travel</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">📄 Bills</option>
                        <option value="Other">📦 Other</option>
                    </select>
                    <button type="submit" class="btn btn-primary">➕ Add Expense</button>
                </form>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="header-card glass">
                <h1>Expense Tracker</h1>
                <div class="header-date" id="current-date">📅 <span id="date-text">Loading...</span></div>
            </header>

            <!-- stats -->
            <div class="stats-grid">
                <div class="stat-card stat-income">
                    <div class="stat-icon">📈</div>
                    <div class="stat-details">
                        <span class="stat-label">Income</span>
                        <span class="stat-value" id="total-income">$0</span>
                    </div>
                </div>
                <div class="stat-card stat-expense">
                    <div class="stat-icon">📉</div>
                    <div class="stat-details">
                        <span class="stat-label">Expenses</span>
                        <span class="stat-value" id="total-expenses">$0</span>
                    </div>
                </div>
                <div class="stat-card stat-balance" id="balance-card">
                    <div class="stat-icon">⚖️</div>
                    <div class="stat-details">
                        <span class="stat-label">Balance</span>
                        <span class="stat-value" id="net-balance">$0</span>
                    </div>
                </div>
            </div>

            <!-- two col -->
            <div class="two-col">
                <!-- history -->
                <div class="panel">
                    <div class="panel-header">
                        <h3>📋 History</h3>
                        <select id="category-filter" class="filter-select">
                            <option value="All">All</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <ul class="expense-list" id="expense-list"></ul>
                    <div id="no-expenses" class="no-data">✨ No expenses yet. Add one!</div>
                </div>

                <!-- insights -->
                <div class="panel">
                    <h3 style="margin-bottom:16px;">🧩 Breakdown</h3>
                    <div class="insight-center">
                        <div class="donut-wrap">
                            <svg viewBox="0 0 100 100" width="150" height="150">
                                <circle class="donut-bg" cx="50" cy="50" r="40" fill="transparent" stroke-width="12"></circle>
                                <circle class="donut-fill" id="chart-progress" cx="50" cy="50" r="40" fill="transparent" stroke-width="12" stroke-dasharray="251.2" stroke-dashoffset="251.2"></circle>
                            </svg>
                            <div class="chart-text">
                                <span class="pct" id="expense-ratio">0%</span>
                                <span class="lbl">of income</span>
                            </div>
                        </div>
                        <div class="legend" id="category-breakdown-legend"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button id="themeToggle" class="theme-floating" aria-label="Toggle theme">🌙</button>

    <script src="script.js"></script>
</body>
</html>
